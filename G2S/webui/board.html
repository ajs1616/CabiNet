<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CabiNet · Gameroom Board</title>
<style>
/* ==========================================================================
   THE GAMEROOM BOARD v2 — a wall-TV spectator page (Fun-menu "Big Board").
   Self-contained (offline slot LAN, no CDN). Modern browser assumed (the
   Pi 5 hub's own HDMI + Chromium, or any TV browser) — unlike glass.html
   this page may use modern CSS/JS freely. Polls /api/status (2s) +
   /api/accounts (10s).

   v2 verdict (AJ, 2026-07-20): v1 "feels like a war room". The feed's form
   (icon | label | machine | timestamp rows) was a log viewer. Inverted:
   the board celebrates PEOPLE and MOMENTS, never reports events. Steady
   state = an attract rotation of spotlight panels + a broadcast lower-third
   that speaks one sentence at a time. Ops chatter (doors, tilts, power,
   spins) never makes the show. Tournament mode takes the whole stage over,
   driven by /api/status "tournament" (phase machine lives hub-side).
   ========================================================================== */
:root{
  --bg:#150f0b; --bg-hi:#241812;
  --card:#1e1510; --card2:#281c13; --inset:#0d0906;
  --line:#3b2b1d; --line2:#2b1f14;
  --ivory:#f4ead7; --dim:#b69d7c; --faint:#7e6950;
  --gold:#d9a94f; --gold-hi:#f2d492; --gold-deep:#93692a;
  --felt:#46c483; --felt-deep:#1c3a2b;
  --ruby:#e0564d; --ruby-deep:#43201c;
  --display:Georgia,"Palatino Linotype","Book Antiqua","Times New Roman",serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"Cascadia Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(120% 90% at 50% 0%,var(--bg-hi) 0%,var(--bg) 55%);
  color:var(--ivory);font:14px/1.45 var(--sans);overflow:hidden;cursor:none}

/* --- masthead: the gameroom name in lights ------------------------------ */
header{display:flex;align-items:baseline;justify-content:space-between;
  padding:26px 44px 14px;border-bottom:1px solid var(--line2)}
#marquee{font:700 54px var(--display);letter-spacing:.12em;color:var(--gold-hi);
  text-shadow:0 0 14px rgba(242,212,146,.45),0 0 46px rgba(217,169,79,.25);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#marquee .bulb{display:inline-block;width:10px;height:10px;border-radius:50%;
  background:var(--gold);margin:0 16px 6px;box-shadow:0 0 10px var(--gold-hi);
  animation:twinkle 1.6s ease-in-out infinite}
#marquee .bulb.b2{animation-delay:.8s}
@keyframes twinkle{0%,100%{opacity:.35}50%{opacity:1}}
#hdr-right{text-align:right;flex:none;padding-left:24px}
#hdr-sub{font:600 11px var(--sans);letter-spacing:.4em;color:var(--faint)}
#hdr-live{font:12px var(--mono);color:var(--dim);margin-top:4px}
#hdr-live .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--felt);box-shadow:0 0 8px var(--felt);margin-right:6px;
  vertical-align:1px}
#hdr-live.err .dot{background:var(--ruby);box-shadow:0 0 8px var(--ruby)}

/* --- the stage ------------------------------------------------------------ */
main{position:relative;height:calc(100vh - 113px);padding:20px 44px 120px}
#stage{position:relative;height:100%}

/* --- attract rotation (the steady-state show) ----------------------------- */
#attract{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center}
body.tourn #attract{display:none}
#pk{font:600 14px var(--sans);letter-spacing:.55em;color:var(--gold);
  margin-bottom:30px}
#panel{max-width:1500px;min-width:0}
#pk.sw,#panel.sw{animation:pfade .6s ease-out}
@keyframes pfade{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
.pnl-none{font:italic 30px var(--display);color:var(--faint)}
.pnl-foot{margin-top:30px;font:600 12px var(--sans);letter-spacing:.4em;
  color:var(--faint)}

/* now playing */
.np-row{font:44px var(--display);margin:10px 0}
.np-who{color:var(--gold-hi);font-weight:700}
.np-on{color:var(--faint);font:italic 30px var(--display);margin:0 16px}
.np-m{color:var(--ivory)}

/* standings (the race for the ledger) */
.sb-row{display:flex;align-items:baseline;gap:22px;font:32px var(--sans);
  padding:10px 4px;border-bottom:1px solid var(--line2);min-width:680px}
.sb-row:last-child{border-bottom:0}
.sb-rank{flex:none;width:64px;font:700 24px var(--mono);color:var(--faint);
  text-align:right}
.sb-nm{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sb-bal{margin-left:auto;font:600 32px var(--mono);color:var(--felt)}
.sb-bal.neg{color:var(--ruby)}
.sb-row.deep .sb-nm,.sb-row.deep .sb-rank{color:var(--ruby)}
.tag{font:10px var(--sans);letter-spacing:.3em;color:var(--ruby);
  border:1px solid var(--ruby-deep);border-radius:4px;padding:3px 8px;
  flex:none;align-self:center}

/* record to beat */
.rec-amt{font:800 140px var(--display);color:var(--gold-hi);line-height:1.05;
  text-shadow:0 0 30px rgba(242,212,146,.5),0 0 90px rgba(217,169,79,.35)}
.rec-who{font:34px var(--display);color:var(--ivory);margin-top:8px}
.rec-sub{font:16px var(--mono);color:var(--dim);margin-top:8px}

/* open seats */
.os-row{font:40px var(--display);margin:10px 0}
.os-m{color:var(--ivory);font-weight:600}
.os-tag{color:var(--felt);font:italic 28px var(--display);margin-left:18px}

/* --- MOMENTS lower-third --------------------------------------------------- */
#moment{position:fixed;left:0;right:0;bottom:36px;display:flex;
  justify-content:center;z-index:20;opacity:0;transition:opacity .6s;
  pointer-events:none}
#moment.on{opacity:1}
body.tourn #moment{display:none}
#mo-line{max-width:88vw;font:600 40px var(--display);color:var(--ivory);
  background:linear-gradient(180deg,rgba(40,28,19,.94),rgba(30,21,16,.94));
  border:1px solid var(--gold-deep);border-radius:18px;padding:20px 48px;
  box-shadow:0 12px 40px rgba(0,0,0,.55);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#mo-line.in{animation:mfade .5s ease-out}
@keyframes mfade{from{opacity:0;transform:translateY(18px)}to{opacity:1}}
.mo-who{color:var(--gold)}
.mo-amt{color:var(--gold-hi);font-weight:700}
.mo-m{color:var(--ivory)}

/* --- TOURNAMENT takeover ---------------------------------------------------- */
#tourn{position:absolute;inset:0;display:none}
body.tourn #tourn{display:block}
.tp{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center}
.tp.on{display:flex}
.t-kick{font:600 15px var(--sans);letter-spacing:.6em;color:var(--gold);
  margin-bottom:18px}
.t-big{font:800 74px var(--display);color:var(--gold-hi);line-height:1.1;
  text-shadow:0 0 24px rgba(242,212,146,.5),0 0 80px rgba(217,169,79,.35)}
.t-sub{font:italic 24px var(--display);color:var(--dim);margin-top:12px}
.seats{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;
  margin-top:42px;max-width:1500px}
.seat{background:linear-gradient(180deg,var(--card2),var(--card));
  border:1px solid var(--line);border-radius:14px;padding:18px 30px;
  min-width:250px;text-align:center}
.seat .s-nm{font:700 30px var(--display);color:var(--ivory)}
.seat .s-al{font:italic 15px var(--display);color:var(--faint)}
.seat .s-m{font:13px var(--mono);color:var(--dim);margin-top:6px}
.seat .s-f{display:inline-block;margin-top:12px;font:600 11px var(--sans);
  letter-spacing:.18em;border-radius:6px;padding:4px 12px;border:1px solid}
.s-f.ok{color:var(--felt);border-color:var(--felt-deep)}
.s-f.pend{color:var(--gold);border-color:var(--gold-deep);
  animation:jpulse 1.4s ease-in-out infinite}
.s-f.fail{color:var(--ruby);border-color:var(--ruby-deep)}

/* countdown: the huge digits (client-interpolated, 100ms tick) */
#cd-big{font:800 min(42vh,30vw) var(--display);line-height:1;
  color:var(--gold-hi);
  text-shadow:0 0 40px rgba(242,212,146,.55),0 0 130px rgba(217,169,79,.4)}
#cd-big.pop{animation:pop .3s ease-out}
@keyframes pop{from{transform:scale(1.22);opacity:.35}to{transform:scale(1)}}
.seatstrip{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  margin-top:36px;max-width:1500px}
.strip-seat{font:16px var(--sans);color:var(--dim);
  border:1px solid var(--line2);border-radius:8px;padding:8px 16px}
.strip-seat b{color:var(--ivory)}

/* running: the race */
#t-running{justify-content:flex-start;padding-top:8px}
.run-top{display:flex;align-items:baseline;justify-content:space-between;
  width:100%;max-width:1520px;padding:0 10px}
#run-clock{font:800 92px var(--mono);color:var(--gold-hi);
  text-shadow:0 0 24px rgba(242,212,146,.4)}
#run-clock.low{color:var(--ruby);animation:jpulse .9s ease-in-out infinite}
#race{display:flex;flex-direction:column;gap:16px;width:100%;
  max-width:1520px;margin-top:22px;padding:0 10px}
.r-row{display:flex;align-items:center;gap:20px;text-align:left}
.r-rank{flex:none;width:74px;font:800 34px var(--mono);color:var(--faint);
  text-align:right}
.r-row.lead .r-rank{color:var(--gold-hi)}
.r-mid{flex:1;min-width:0}
.r-nm{font:600 26px var(--sans);color:var(--ivory);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.r-al{font:italic 16px var(--display);color:var(--faint)}
.r-mach{font:14px var(--mono);color:var(--dim)}
.r-track{height:26px;background:var(--inset);border:1px solid var(--line2);
  border-radius:13px;overflow:hidden;margin-top:6px}
.r-bar{height:100%;background:linear-gradient(90deg,var(--gold-deep),
  var(--gold),var(--gold-hi));border-radius:13px;transition:width .9s ease;
  box-shadow:0 0 14px rgba(217,169,79,.35)}
.r-sc{flex:none;width:200px;font:700 30px var(--mono);color:var(--gold-hi);
  text-align:right}

/* finished: the ceremony (fireworks canvas behind the text) */
#t-finished{overflow:hidden}
#ty-c{position:absolute;inset:0;width:100%;height:100%;z-index:0}
#t-finished>*:not(canvas){position:relative;z-index:1}
#fin-title{font:800 84px var(--display);color:var(--gold-hi);line-height:1.1;
  text-shadow:0 0 30px rgba(242,212,146,.6),0 0 90px rgba(217,169,79,.45)}
#fin-stand{margin-top:32px;display:flex;flex-direction:column;gap:8px}
.f-row{display:flex;gap:22px;align-items:baseline;font:26px var(--sans);
  min-width:640px;text-align:left}
.f-rank{flex:none;width:56px;text-align:right;font:700 20px var(--mono);
  color:var(--faint)}
.f-nm{color:var(--ivory);overflow:hidden;white-space:nowrap;
  text-overflow:ellipsis}
.f-sc{margin-left:auto;font:600 26px var(--mono);color:var(--gold-hi)}
#fin-sweep{margin-top:28px}
.sw-line{font:italic 20px var(--display);color:var(--dim);margin:5px 0}
.sw-line b{color:var(--ivory);font-style:normal}

/* --- confetti (small-moment celebration, no takeover) ---------------------- */
#cf-c{position:fixed;inset:0;width:100%;height:100%;z-index:30;
  pointer-events:none}

/* --- jackpot takeover ------------------------------------------------------ */
#fw{position:fixed;inset:0;z-index:50;display:none;background:rgba(8,5,3,.88)}
#fw.on{display:block}
#fw canvas{position:absolute;inset:0;width:100%;height:100%}
#fw .card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:2}
#fw .jt{font:600 18px var(--sans);letter-spacing:.6em;color:var(--gold);
  animation:jpulse 1.1s ease-in-out infinite}
#fw .jbig{font:800 120px var(--display);color:var(--gold-hi);line-height:1.05;
  text-shadow:0 0 30px rgba(242,212,146,.6),0 0 90px rgba(217,169,79,.45)}
#fw .jwho{font:32px var(--display);color:var(--ivory);margin-top:10px}
#fw .jm{font:16px var(--mono);color:var(--dim);margin-top:6px}
@keyframes jpulse{0%,100%{opacity:.55}50%{opacity:1}}

/* --- disabled screen -------------------------------------------------------- */
#off{position:fixed;inset:0;z-index:60;display:none;align-items:center;
  justify-content:center;background:var(--bg);text-align:center}
#off.on{display:flex}
#off .t{font:italic 26px var(--display);color:var(--faint)}
</style>
</head>
<body>
<header>
  <div id="marquee"><span class="bulb"></span><span id="gm-name">GAME ROOM</span><span class="bulb b2"></span></div>
  <div id="hdr-right">
    <div id="hdr-sub">CABINET · GAMEROOM BOARD</div>
    <div id="hdr-live"><span class="dot"></span><span id="hdr-t">connecting…</span></div>
  </div>
</header>
<main>
  <div id="stage">
    <div id="attract">
      <div id="pk"></div>
      <div id="panel"></div>
    </div>
    <div id="tourn">
      <div class="tp" id="t-armed">
        <div class="t-kick">🏆 TOURNAMENT NIGHT</div>
        <div class="t-big">TAKE YOUR SEATS</div>
        <div class="t-sub" id="ar-sub"></div>
        <div class="seats" id="ar-seats"></div>
      </div>
      <div class="tp" id="t-countdown">
        <div class="t-kick">STARTING IN</div>
        <div id="cd-big">·</div>
        <div class="seatstrip" id="cd-seats"></div>
      </div>
      <div class="tp" id="t-running">
        <div class="run-top">
          <span class="t-kick" style="margin:0">🏁 THE RACE</span>
          <span id="run-clock">–:––</span>
        </div>
        <div id="race"></div>
      </div>
      <div class="tp" id="t-finished">
        <canvas id="ty-c"></canvas>
        <div class="t-kick">🏆 TOURNAMENT COMPLETE</div>
        <div class="t-big" id="fin-title"></div>
        <div id="fin-stand"></div>
        <div id="fin-sweep"></div>
      </div>
    </div>
  </div>
</main>

<div id="moment"><div id="mo-line"></div></div>
<canvas id="cf-c"></canvas>

<div id="fw"><canvas id="fw-c"></canvas>
  <div class="card">
    <div class="jt">JACKPOT · HANDPAY</div>
    <div class="jbig" id="fw-amt">JACKPOT!</div>
    <div class="jwho" id="fw-who"></div>
    <div class="jm" id="fw-m"></div>
  </div>
</div>
<div id="off"><div>
  <div class="t">The gameroom board is switched off.</div>
  <div class="t" style="font-size:15px;margin-top:10px">Enable it in Settings ▸ Gameroom board.</div>
</div></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const POLL=2000;
let S={status:null,accounts:[]}, seenEv=new Set(), jackActive=new Set(),
    firstPoll=true;

const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",
  ">":"&gt;",'"':"&quot;"}[c]));
const money=mc=>{const n=Number(mc)||0, s=n<0?"-":"", a=Math.abs(n)/100000;
  return s+"$"+a.toLocaleString(undefined,{minimumFractionDigits:2,
    maximumFractionDigits:2});};
const cents=c=>money((Number(c)||0)*1000);
const clock=iso=>{try{return new Date(iso).toLocaleTimeString([],
  {hour:"numeric",minute:"2-digit"});}catch(e){return "";}};

// EGM discrimination is STRUCTURAL (a real per-EGM snapshot always carries
// commsState as a string) — the v1 denylist leaked every NEW top-level
// /api/status key in as a phantom machine; home.html's rule, adopted.
function egmList(){const j=S.status||{};
  return Object.keys(j).filter(k=>j[k]&&typeof j[k]==="object"
    &&typeof j[k].commsState==="string");}
function nick(egm){const n=((S.status||{}).names||{})[egm];
  if(n&&String(n).trim()) return String(n).trim();
  const id=(((S.status||{})[egm]||{}).cabinet||{}).identity||{};
  if(id.productName) return (id.vendorName?id.vendorName+" ":"")+id.productName;
  return egm.length>10?"…"+egm.slice(-8):egm;}
function cardedName(egm){const cs=((S.status||{}).cardSessions||{})[egm];
  return cs&&cs.name?cs.name:null;}
function accName(id){if(!id) return null;
  const a=(S.accounts||[]).find(x=>x&&x.id===id);
  return a&&a.name?String(a.name):null;}

/* ---- night records: biggest hit persists per local date ---------------- */
const nightKey=()=>"board_night_"+new Date().toLocaleDateString();
function nightRec(){try{return JSON.parse(localStorage.getItem(nightKey()))||null;}
  catch(e){return null;}}
function nightSave(r){try{localStorage.setItem(nightKey(),JSON.stringify(r));}
  catch(e){}}

/* ---- polling ------------------------------------------------------------ */
async function tick(){
  try{
    const r=await fetch("/api/status",{cache:"no-store"});
    S.status=await r.json();
    $("hdr-live").classList.remove("err");
    $("hdr-t").textContent="live · "+new Date().toLocaleTimeString([],
      {hour:"numeric",minute:"2-digit"});
    render();
  }catch(e){
    $("hdr-live").classList.add("err");
    $("hdr-t").textContent="hub unreachable";
  }finally{setTimeout(tick,POLL);}
}
async function tickAccounts(){
  try{const r=await fetch("/api/accounts",{cache:"no-store"});
    const j=await r.json(); S.accounts=(j&&j.accounts)||[];
  }catch(e){}
  finally{setTimeout(tickAccounts,10000);}
}

/* ---- render ------------------------------------------------------------- */
// Hub clock offset: the tournament snapshot carries serverNow so countdown
// math never trusts the TV's own clock — hubNow() interpolates between
// polls from the last observed skew (smooth digits, no 2s jumps).
let skewMs=0;
const hubNow=()=>Date.now()+skewMs;

function render(){
  const ho=(S.status||{}).hostOptions||{};
  if(ho.boardEnabled===false){$("off").classList.add("on");return;}
  $("off").classList.remove("on");
  $("gm-name").textContent=(ho.gameroomName||"GAME ROOM").toUpperCase();
  const t=(S.status||{}).tournament||null;
  if(t&&typeof t.serverNow==="number"&&isFinite(t.serverNow))
    skewMs=t.serverNow*1000-Date.now();
  harvestMoments();
  const active=!!(t&&typeof t.phase==="string"&&t.phase!=="idle");
  document.body.classList.toggle("tourn",active);
  if(active){renderTourn(t);}
  else{
    if(lastPhase!==null){fwCer.hardStop();lastPhase=null;}
    renderAttract();
  }
  checkJackpots();
  maybeReload();
  firstPoll=false;
}

/* ---- MOMENTS: the broadcast lower-third --------------------------------- */
// One sentence at a time, big type, minimum 6s on screen. Fed by the
// activity tape (G2S hooks + hub-side "tito" entries for the SAS side).
// No timestamps, no machine column, no ×N counters — a sentence or nothing.
// Ops hooks (doors, tilts, power, service lamp, per-spin chatter) never
// appear here by construction: only the hooks named below get a template.
const MOMENT_MIN_MS=6000, MOMENT_MAX_MS=14000, MOMENT_QCAP=6;
const CONFETTI_MIN_MC=1000000;   // $10 — the small-celebration threshold
let momentQ=[], momentOn=false, momentShownAt=0;

// tito tape entries name SAS machines "sas:<smib>:<addr>"; the names map
// and sas section key the same machine "<smib>/<addr>".
function momMachine(egmId){
  const e=String(egmId||"");
  if(e.startsWith("sas:")) return nick(e.slice(4).split(":").join("/"));
  return nick(e);
}
// keyedOff eventReports carry no amount — the closed handpay record in the
// EGM snapshot does (keyOff*Amt, millicents); match on transactionId.
function keyOffAmt(egm,txn){
  if(!txn) return 0;
  const hs=(((S.status||{})[egm]||{}).recentHandpays)||[];
  for(const h of hs) if(String(h.transactionId)===String(txn))
    return (Number(h.keyOffCashableAmt)||0)+(Number(h.keyOffPromoAmt)||0)
          +(Number(h.keyOffNonCashAmt)||0);
  return 0;
}

function momentFrom(a){
  const ex=a.extras||{}, egm=a.egmId||"";
  const W=n=>`<span class="mo-who">${esc(n)}</span>`;
  const A=mc=>`<span class="mo-amt">${esc(money(mc))}</span>`;
  const M=()=>`<span class="mo-m">${esc(momMachine(egm))}</span>`;
  const who=cardedName(egm);
  switch(a.hook){
    case "bill_in":{
      const amt=Number(ex.amt)||0;
      return {amtMc:amt,
        html:`${W(who||"Someone")} slid ${amt?A(amt):"a bill"} into ${M()}`};
    }
    case "wat_transfer_completed":{
      // wallet money — direction picks the sentence. A cash-out (fromEgm)
      // names the RECEIVING account first: a tournament sweep's CASH OUT
      // press can land while somebody is still carded, and "AJ banked
      // $20" when the money went home to the House is misinformation on
      // the showpiece screen. For a normal cash-out the carded player IS
      // the account holder, so nothing changes. Loads keep the carded
      // voice with the account as fallback.
      const amt=Number(ex.amt)||0;
      const name=(ex.direction==="G2S_fromEgm"
        ?(accName(ex.accountId)||who)
        :(who||accName(ex.accountId)))||"Someone";
      if(ex.direction==="G2S_fromEgm")
        return {amtMc:amt, html:`${W(name)} banked ${A(amt)}`};
      return {amtMc:amt, html:`${W(name)} loaded ${A(amt)} onto ${M()}`};
    }
    case "voucher_issued":   // G2S voucher events carry no amount — say less
      return {amtMc:0, html:`${M()} printed a ticket`};
    case "voucher_redeemed":
      return {amtMc:0, html:`a ticket fed into ${M()}`};
    case "tito":{
      // hub-side TITO tape (the SAS machines' paper moments). Collision /
      // needs-attention entries are ops, not show.
      if(ex.attention) return null;
      const amt=Number(ex.amountMc)||0, l=String(a.label||"");
      if(/minted|printed/i.test(l))
        return {amtMc:amt, html:`${M()} printed a ${amt?A(amt)+" ":""}ticket`};
      if(/redeemed/i.test(l))
        return {amtMc:amt, html:`a ${amt?A(amt)+" ":""}ticket fed into ${M()}`};
      return null;
    }
    case "bonus_award_paid":{
      const amt=Number(ex.amt||ex.amountMc)||0;
      return {amtMc:amt, html:`${M()} dropped a ${amt?A(amt)+" ":""}bonus`};
    }
    case "handpay_keyed_off":{
      const amt=keyOffAmt(egm,ex.transactionId);
      return {amtMc:amt,
        html:`${W(who||"the winner")} got paid${amt?" "+A(amt):""}`};
    }
  }
  return null;   // everything else is telemetry — the show doesn't do telemetry
}

function harvestMoments(){
  const raw=((S.status||{}).activity||[]);
  const fresh=[];
  for(const a of raw){
    const key=(a.seenAt||"")+(a.hook||"")+(a.egmId||"");
    if(seenEv.has(key)) continue;
    seenEv.add(key);
    if(firstPoll) continue;   // history never replays at page load
    fresh.push(a);
  }
  if(seenEv.size>600) seenEv=new Set([...seenEv].slice(-300));
  // tape is newest-first; the show speaks in order
  for(const a of fresh.reverse()){
    const m=momentFrom(a);
    if(!m) continue;
    momentQ.push(m);
    if(momentQ.length>MOMENT_QCAP) momentQ.shift();
  }
}

function momentLoop(){
  const now=Date.now();
  if(momentQ.length&&(!momentOn||now-momentShownAt>=MOMENT_MIN_MS)){
    const m=momentQ.shift();
    const el=$("mo-line");
    el.innerHTML=m.html;
    el.classList.remove("in"); void el.offsetWidth; el.classList.add("in");
    $("moment").classList.add("on");
    momentOn=true; momentShownAt=now;
    // celebration tier 2: real money gets a confetti burst, never a takeover
    // (and never during a tournament — the race owns the screen)
    if((m.amtMc||0)>=CONFETTI_MIN_MC
        &&!document.body.classList.contains("tourn")) cf.start(900);
  }else if(momentOn&&!momentQ.length&&now-momentShownAt>=MOMENT_MAX_MS){
    $("moment").classList.remove("on");
    momentOn=false;
  }
}
setInterval(momentLoop,500);

/* ---- attract rotation (steady state, tournament idle only) --------------- */
const PANEL_MS=12000;
let panelIx=0, panelAt=0;

function litCount(){
  let n=0;
  for(const e of egmList()) if((S.status[e]||{}).commsState==="onLine") n++;
  const linked=new Set(egmList().map(e=>(S.status[e]||{}).sasLink)
    .filter(Boolean));
  const sas=(S.status||{}).sas||{};
  for(const k of Object.keys(sas))
    if(!linked.has(k)&&(sas[k]||{}).online!==false) n++;
  return n;
}

function nowPlayingPanel(){
  const cs=(S.status||{}).cardSessions||{};
  const rows=Object.keys(cs).map(egm=>{
    const n=(cs[egm]||{}).name; if(!n) return "";
    return `<div class="np-row"><span class="np-who">${esc(n)}</span>`+
      `<span class="np-on">is on</span>`+
      `<span class="np-m">${esc(nick(egm))}</span></div>`;
  }).filter(Boolean);
  const lit=litCount();
  const foot=`<div class="pnl-foot">${lit} MACHINE${lit===1?"":"S"} LIT</div>`;
  if(!rows.length) return {kick:"🎰 NOW PLAYING",
    html:`<div class="pnl-none">Nobody’s carded in — the floor is wide open.</div>${foot}`};
  return {kick:"🎰 NOW PLAYING", html:rows.join("")+foot};
}

function standingsPanel(){
  const ppl=(S.accounts||[]).filter(a=>a&&a.kind!=="house");
  if(!ppl.length) return {kick:"💰 STANDINGS",
    html:'<div class="pnl-none">No players yet — somebody card in.</div>'};
  ppl.sort((a,b)=>(b.cashableMillicents||0)-(a.cashableMillicents||0));
  const top=ppl.slice(0,4), deep=ppl[ppl.length-1];
  const row=(a,i,tag)=>{const mc=a.cashableMillicents||0;
    return `<div class="sb-row ${tag?"deep":""}">
      <span class="sb-rank">${tag?"☠":"#"+(i+1)}</span>
      <span class="sb-nm">${esc(a.name||a.id)}</span>
      ${tag?'<span class="tag">DEEPEST IN THE RED</span>':""}
      <span class="sb-bal ${mc<0?"neg":""}">${money(mc)}</span></div>`;};
  let html=top.map((a,i)=>row(a,i)).join("");
  if(deep&&(deep.cashableMillicents||0)<0&&!top.includes(deep))
    html+=row(deep,0,true);
  return {kick:"💰 STANDINGS", html};
}

function recordPanel(){
  const r=nightRec();
  if(!r) return {kick:"🏆 RECORD TO BEAT",
    html:'<div class="pnl-none">The night is young — set the record.</div>'};
  return {kick:"🏆 RECORD TO BEAT", html:`
    <div class="rec-amt">${esc(r.amt!=null?money(r.amt):"JACKPOT")}</div>
    <div class="rec-who">${r.who?esc(r.who)+"’s buying dinner":"Who’s buying dinner?"}</div>
    <div class="rec-sub">${esc(r.mach||"")}${r.at?" · "+esc(clock(r.at)):""}</div>`};
}

function openSeatsPanel(){
  const rows=[];
  const seat=nm=>`<div class="os-row"><span class="os-m">${esc(nm)}</span>`+
    `<span class="os-tag">open seat</span></div>`;
  for(const egm of egmList()){
    const m=S.status[egm]||{};
    if(m.commsState!=="onLine") continue;
    if(cardedName(egm)) continue;
    rows.push(seat(nick(egm)));
  }
  // orphan SAS legs: a leg linked to a G2S cabinet already counts via that
  // cabinet's row — only unlinked legs get their own seat
  const linked=new Set(egmList().map(e=>(S.status[e]||{}).sasLink)
    .filter(Boolean));
  const sas=(S.status||{}).sas||{};
  for(const k of Object.keys(sas)){
    if(linked.has(k)) continue;
    if((sas[k]||{}).online===false) continue;
    rows.push(seat(nick(k)));
  }
  if(!rows.length) return {kick:"🪑 OPEN SEATS",
    html:'<div class="pnl-none">Every seat is taken — or the floor is dark.</div>'};
  return {kick:"🪑 OPEN SEATS", html:rows.join("")};
}

const PANELS=[nowPlayingPanel,standingsPanel,recordPanel,openSeatsPanel];
function renderAttract(){
  const now=Date.now();
  let flip=false;
  if(!panelAt){panelAt=now;}
  else if(now-panelAt>=PANEL_MS){
    panelIx=(panelIx+1)%PANELS.length; panelAt=now; flip=true;
  }
  const p=PANELS[panelIx]();
  $("pk").textContent=p.kick;
  $("panel").innerHTML=p.html;
  if(flip) for(const id of ["pk","panel"]){
    const el=$(id);
    el.classList.remove("sw"); void el.offsetWidth; el.classList.add("sw");
  }
}

/* ---- TOURNAMENT takeover ------------------------------------------------- */
// Rendered straight off /api/status "tournament" — the phase machine lives
// hub-side; the board is a pure spectator (phase/seats/scoreMc/startsAt/
// endsAt/serverNow). Fireworks still fire on handpays mid-race: the
// jackpot detector below never stops running.
let lastPhase=null;

function seatList(t){
  return Object.entries(t.seats||{})
    .map(([k,s])=>Object.assign({key:k},s||{}))
    .sort((a,b)=>String(a.machine||"").localeCompare(String(b.machine||"")));
}

function renderTourn(t){
  const phase=t.phase;
  for(const p of ["armed","countdown","running","finished"])
    $("t-"+p).classList.toggle("on",phase===p);
  if(phase!==lastPhase){
    // ceremony fireworks fire once, on arrival at "finished" (the canvas
    // must be visible before start() sizes it — toggles above come first)
    if(phase==="finished") fwCer.start(18000);
    else fwCer.hardStop();
    lastPhase=phase;
  }
  if(phase==="armed"){
    // caption the funded floor off the FROZEN run stake (runCreditsCents)
    // — a reconfigure-while-armed retargets the NEXT round's creditsCents,
    // not the credits already sitting on the glass
    const cc=t.runCreditsCents||t.creditsCents;
    $("ar-sub").textContent=cc
      ?"every seat starts with "+cents(cc)+" on the house":"";
    $("ar-seats").innerHTML=seatCards(t);
  }else if(phase==="countdown"){
    $("cd-seats").innerHTML=seatStrip(t);
  }else if(phase==="running"){
    renderRace(t);
  }else if(phase==="finished"){
    renderFinished(t);
  }
}

function seatCards(t){
  const cc=t.runCreditsCents||t.creditsCents; // frozen run stake first
  const cards=seatList(t).map(s=>{
    const f=s.funded==="ok"
        ?["ok","💰 "+(cc?cents(cc):"credits")+" loaded"]
      :s.funded==="failed"?["fail","⚠ funding failed"]
      :["pend","funding…"];
    const al=(s.alias&&s.alias!==s.name)
      ?`<div class="s-al">a.k.a. ${esc(s.alias)}</div>`:"";
    return `<div class="seat"><div class="s-nm">${esc(s.name||"?")}</div>${al}
      <div class="s-m">${esc(s.machine||"")}</div>
      <div class="s-f ${f[0]}">${f[1]}</div></div>`;
  });
  // phase-honest empty state: the hub publishes the seat map WITH the
  // armed claim, so this only shows in a stale-poll blink — never say
  // "no machines" at the dramatic arm moment (an unseatable floor never
  // reaches the board: the arm refuses and stays idle)
  return cards.join("")
    ||'<div class="pnl-none">Seating the floor…</div>';
}

function seatStrip(t){
  return seatList(t).map(s=>
    `<div class="strip-seat"><b>${esc(s.name||"?")}</b> · ${esc(s.machine||"")}</div>`
  ).join("");
}

// The race rows keep a STABLE DOM (keyed by seat) so the bar widths animate
// via CSS transition and reordering rides flex `order` — a full innerHTML
// rebuild every poll would kill the motion.
function renderRace(t){
  const seats=Object.entries(t.seats||{})
    .map(([k,s])=>Object.assign({key:k},s||{}))
    .sort((a,b)=>(b.scoreMc||0)-(a.scoreMc||0));
  const max=Math.max(1,...seats.map(s=>s.scoreMc||0));
  const box=$("race"), seen=new Set();
  seats.forEach((s,i)=>{
    seen.add(s.key);
    let row=box.querySelector(`[data-seat="${CSS.escape(s.key)}"]`);
    if(!row){
      row=document.createElement("div");
      row.className="r-row"; row.dataset.seat=s.key;
      row.innerHTML='<span class="r-rank"></span><div class="r-mid">'+
        '<div class="r-nm"></div><div class="r-track">'+
        '<div class="r-bar"></div></div></div><span class="r-sc"></span>';
      box.appendChild(row);
    }
    row.style.order=i;
    row.classList.toggle("lead",i===0&&(s.scoreMc||0)>0);
    row.querySelector(".r-rank").textContent="#"+(i+1);
    const sub=(s.alias&&s.alias!==s.name)
      ?` <span class="r-al">${esc(s.alias)}</span>`:"";
    row.querySelector(".r-nm").innerHTML=
      `${esc(s.name||"?")}${sub} <span class="r-mach">· ${esc(s.machine||"")}</span>`;
    row.querySelector(".r-bar").style.width=
      Math.max(2,100*(s.scoreMc||0)/max)+"%";
    row.querySelector(".r-sc").textContent=money(s.scoreMc||0);
  });
  for(const row of [...box.children])
    if(!seen.has(row.dataset.seat)) row.remove();
}

function renderFinished(t){
  const seats=Object.entries(t.seats||{})
    .map(([k,s])=>Object.assign({key:k},s||{}))
    .sort((a,b)=>(b.scoreMc||0)-(a.scoreMc||0));
  const w=t.winner||seats[0]||null;
  $("fin-title").textContent=
    w&&w.name?w.name+"’s buying dinner!":"That’s a wrap!";
  $("fin-stand").innerHTML=seats.map((s,i)=>`<div class="f-row">
    <span class="f-rank">#${i+1}</span>
    <span class="f-nm">${esc(s.name||"?")} <span class="r-mach">· ${esc(s.machine||"")}</span></span>
    <span class="f-sc">${money(s.scoreMc||0)}</span></div>`).join("");
  // sweep status: leftovers going home to the House — host-initiated
  // pulls, no human finger needed (states: pulling/done/failed/skipped/
  // timeout; detail carries the sentence when there is one)
  $("fin-sweep").innerHTML=seats.filter(s=>s.sweep).map(s=>{
    const sw=s.sweep||{};
    const line=esc(sw.detail||sw.state||"");
    return line?`<div class="sw-line">${line}</div>`:"";
  }).join("");
}

// The countdown/race clocks tick at 100ms off the skew-corrected hub clock —
// smooth digits between the 2s polls, the phase flip itself stays hub-owned.
const fmtClock=s=>{s=Math.max(0,Math.ceil(s));
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};
function tournClockTick(){
  const t=(S.status||{}).tournament;
  if(!t) return;
  if(t.phase==="countdown"&&typeof t.startsAt==="number"){
    const secs=(t.startsAt*1000-hubNow())/1000;
    const disp=secs<=0?"GO!":(secs>90?fmtClock(secs):String(Math.ceil(secs)));
    const el=$("cd-big");
    if(el.textContent!==disp){
      el.textContent=disp;
      el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
    }
  }else if(t.phase==="running"&&typeof t.endsAt==="number"){
    const secs=Math.max(0,(t.endsAt*1000-hubNow())/1000);
    const el=$("run-clock");
    el.textContent=fmtClock(secs);
    el.classList.toggle("low",secs<=10);
  }
}
setInterval(tournClockTick,100);

/* ---- self-reload (boardStamp) -------------------------------------------- */
// A redeployed board.html used to sit stale on the wall TV forever. The hub
// stamps the file's mtime into /api/status as boardStamp; reload ONLY when
// the show is dark: no tournament, no fireworks/confetti, no sentence on
// screen. An old hub has no stamp — then we never reload (as before).
let stampBase=null;
function maybeReload(){
  const st=(S.status||{}).boardStamp;
  if(st==null) return;
  if(stampBase===null){stampBase=st;return;}
  if(st===stampBase) return;
  const t=(S.status||{}).tournament;
  if(t&&typeof t.phase==="string"&&t.phase!=="idle") return;
  if(fwJack.running()||fwCer.running()||cf.running()) return;
  if(momentOn||momentQ.length) return;
  location.reload();
}

/* ---- jackpot detection + fireworks -------------------------------------- */
function checkJackpots(){
  const now=new Set();
  let sasPending=false;
  const sas=(S.status||{}).sas||{};
  for(const k of Object.keys(sas))
    if((sas[k]||{}).pendingHandpay){now.add("sas:"+k);sasPending=true;}
  for(const egm of egmList()){
    const pend=(S.status[egm]||{}).pendingHandpays||[];
    // dual-leg dedupe (the home.html rule): while a SAS leg holds the
    // lockup, the G2S copy of the SAME lockup is suppressed
    if(pend.length&&!sasPending) now.add("g2s:"+egm);
    if(pend.length&&sasPending){/* linked: SAS key carries the show */}
  }
  for(const key of now){
    if(jackActive.has(key)||firstPoll) continue;
    // fresh lockup → the show
    let amt=null, egm=null;
    if(key.startsWith("g2s:")){
      egm=key.slice(4);
      const h=((S.status[egm]||{}).pendingHandpays||[])[0]||{};
      amt=(Number(h.pendingCashableAmt)||0)+(Number(h.pendingPromoAmt)||0)
         +(Number(h.pendingNonCashAmt)||0);
    }else{
      // SAS lockup has no amount on the wire; borrow the freshest G2S
      // record if a linked leg reported one this poll
      for(const e of egmList()){
        const h=((S.status[e]||{}).pendingHandpays||[])[0];
        if(h){egm=e;amt=(Number(h.pendingCashableAmt)||0)
          +(Number(h.pendingPromoAmt)||0)+(Number(h.pendingNonCashAmt)||0);break;}
      }
      if(!egm) egm=key.slice(4);
    }
    celebrate(egm,amt);
  }
  jackActive=now;
}

let fwTimer=null;
function celebrate(egm,amtMc){
  const who=cardedName(egm), mach=nick(egm);
  $("fw-amt").textContent=amtMc?money(amtMc):"JACKPOT!";
  $("fw-who").textContent=who?who+"!":"";
  $("fw-m").textContent=mach+(who?"":" · somebody get over there");
  $("fw").classList.add("on");
  startFireworks();
  clearTimeout(fwTimer);
  fwTimer=setTimeout(()=>{$("fw").classList.remove("on");stopFireworks();},14000);
  // night record: biggest hit wins the RECORD TO BEAT panel. An unknown
  // amount stays null — storing 0 would headline "RECORD TO BEAT $0.00"
  // all night and dead-code recordPanel's amount-less "JACKPOT" line.
  const r=nightRec();
  if(!r||(amtMc||0)>(r.amt||0))
    nightSave({amt:amtMc||null,who:who||null,mach:mach,at:new Date().toISOString()});
}

/* ---- particle engines ----------------------------------------------------- */
// One engine, three tenants: the jackpot takeover (trail fill, endless
// bursts while the overlay is up — v1 behavior, unchanged), the tournament
// ceremony (trail fill, 18s of bursts behind the winner card) and the
// confetti tier (clearRect — no dimming, it plays over the live page).
const COLORS=["#f2d492","#d9a94f","#e0564d","#f4ead7","#46c483"];
function fwEngine(canvasId,opts){
  const trail=!!(opts&&opts.trail),
        nMin=(opts&&opts.count)||70, nRand=(opts&&opts.countRand)||50,
        rBase=(opts&&opts.r)||1.2;
  let parts=[], last=0, anim=null, until=0, alive=null;
  function burst(c){
    const x=c.width*(0.15+Math.random()*0.7),
          y=c.height*(0.12+Math.random()*0.45),
          col=COLORS[Math.floor(Math.random()*COLORS.length)],
          n=nMin+Math.random()*nRand;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, v=1.5+Math.random()*4.5;
      parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
        r:rBase+Math.random()*2.2,col,life:60+Math.random()*40,max:100});
    }
  }
  function frame(t){
    if(alive&&!alive()){anim=null;parts=[];return;}
    const c=$(canvasId), ctx=c.getContext("2d");
    const spawning=!until||t<until;
    if(spawning&&t-last>420){burst(c);last=t;}
    if(trail){ctx.fillStyle="rgba(8,5,3,0.22)";ctx.fillRect(0,0,c.width,c.height);}
    else{ctx.clearRect(0,0,c.width,c.height);}
    for(const p of parts){
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.035; p.life-=1;
      ctx.globalAlpha=Math.max(p.life/p.max,0);
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
    parts=parts.filter(p=>p.life>0);
    if(!spawning&&!parts.length){anim=null;return;}
    anim=requestAnimationFrame(frame);
  }
  return {
    start(ms,aliveFn){
      const c=$(canvasId);
      c.width=c.clientWidth||innerWidth; c.height=c.clientHeight||innerHeight;
      parts=[]; last=0; alive=aliveFn||null;
      until=ms?performance.now()+ms:0;   // 0 = burst until stopped
      if(anim==null) anim=requestAnimationFrame(frame);
    },
    hardStop(){
      until=performance.now()-1; parts=[]; alive=null;
      if(anim!=null){cancelAnimationFrame(anim);anim=null;}
    },
    running(){return anim!=null;}
  };
}
const fwJack=fwEngine("fw-c",{trail:true});
const fwCer =fwEngine("ty-c",{trail:true});
const cf    =fwEngine("cf-c",{trail:false,count:26,countRand:22,r:1.4});
// v1 names kept so celebrate() reads the same as it always did
function startFireworks(){fwJack.start(0,()=>$("fw").classList.contains("on"));}
function stopFireworks(){fwJack.hardStop();}

tick(); tickAccounts();
</script>
