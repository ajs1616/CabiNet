<!DOCTYPE html>
<html>
<!-- CasinoNet mediaDisplay probe page (#18 P9) — the loadContent payoff:
     the EGM's built-in browser GETs this from the host and the gameroom name in giant type
     text lands on the glass. Worse-of-fleet constraints: ES5 only (no
     const/let/arrow/fetch), no external assets, plain block layout,
     portrait 256x1024-friendly, high contrast on dark. The inline script
     writes the browser's own userAgent into the page so a single
     screenshot self-documents which engine rendered it. -->
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>{{GAMEROOM}}</title>
<style type="text/css">
html, body {
  margin: 0;
  padding: 0;
  background: #000000;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
}
#brand {
  margin-top: 8%;
  font-size: 64px;
  font-weight: bold;
  letter-spacing: 4px;
  color: #ffd700;
}
#alive {
  margin-top: 6%;
  font-size: 40px;
  font-weight: bold;
  color: #00ff44;
}
#clock {
  margin-top: 6%;
  font-size: 52px;
  font-weight: bold;
  color: #ffffff;
}
#ua {
  margin-top: 10%;
  padding: 4px;
  font-size: 13px;
  color: #9999ff;
  word-wrap: break-word;
}
</style>
</head>
<body>
<div id="brand">{{GAMEROOM}}</div>
<div id="alive">IT'S ALIVE</div>
<div id="clock">--:--:--</div>
<div id="ua"></div>
<script type="text/javascript">
(function () {
  var uaDiv = document.getElementById('ua');
  uaDiv.appendChild(document.createTextNode(
    navigator.userAgent || '(no userAgent)'));
  function two(n) {
    return (n < 10 ? '0' : '') + n;
  }
  function tick() {
    var d = new Date();
    var el = document.getElementById('clock');
    // replace, never append — old engines leak nodes on innerHTML churn
    while (el.firstChild) {
      el.removeChild(el.firstChild);
    }
    el.appendChild(document.createTextNode(
      two(d.getHours()) + ':' + two(d.getMinutes()) + ':' +
      two(d.getSeconds())));
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
