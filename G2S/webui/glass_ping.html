<!DOCTYPE html>
<html>
<!-- CasinoNet mediaDisplay interactivity probe (#18 P9, path A): ONE giant
     button that XMLHttpRequests GET /api/glass/ping?src=glass on the SAME
     host that served this page, and paints the response text — proving the
     on-glass browser can talk back to CasinoNet. Same worse-of-fleet
     constraints as hello.html: ES5 only (no const/let/arrow/fetch), no
     external assets, portrait-friendly, high contrast on dark. -->
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>{{GAMEROOM}} PING</title>
<style type="text/css">
html, body {
  margin: 0;
  padding: 0;
  background: #000000;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
}
#brand {
  margin-top: 5%;
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 4px;
  color: #ffd700;
}
#ping {
  margin-top: 10%;
  width: 90%;
  height: 180px;
  font-size: 44px;
  font-weight: bold;
  color: #000000;
  background: #00ff44;
  border: 6px solid #ffffff;
  cursor: pointer;
}
#out {
  margin-top: 8%;
  padding: 4px;
  font-size: 24px;
  font-weight: bold;
  color: #00ffee;
  word-wrap: break-word;
}
#ua {
  margin-top: 10%;
  padding: 4px;
  font-size: 13px;
  color: #9999ff;
  word-wrap: break-word;
}
</style>
</head>
<body>
<div id="brand">{{GAMEROOM}}</div>
<button id="ping" type="button">PING THE HOST</button>
<div id="out">(waiting for the button)</div>
<div id="ua"></div>
<script type="text/javascript">
(function () {
  var out = document.getElementById('out');
  document.getElementById('ua').appendChild(document.createTextNode(
    navigator.userAgent || '(no userAgent)'));
  function setOut(text) {
    while (out.firstChild) {
      out.removeChild(out.firstChild);
    }
    out.appendChild(document.createTextNode(text));
  }
  document.getElementById('ping').onclick = function () {
    setOut('PINGING...');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/glass/ping?src=glass', true);
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4) {
        if (xhr.status === 200) {
          setOut('PONG: ' + xhr.responseText);
        } else {
          setOut('FAIL: HTTP ' + xhr.status);
        }
      }
    };
    xhr.send(null);
  };
})();
</script>
</body>
</html>
