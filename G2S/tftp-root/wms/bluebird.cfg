# WMS BlueBird 2 Enhanced (BB2E) G2S bootstrap config — CasinoNet
#
# ============================================================================
# TODO(bench): THIS ENTIRE FILE FORMAT IS UNVERIFIED SCAFFOLDING.
#   - No WMS document describes a TFTP-fetched config file for BB2E; the
#     section/key names below are CasinoNet design fiction (IGT-derived),
#     NOT a cited WMS schema. Do not treat any key here as real.
#   - It is UNKNOWN whether a BB2E ever TFTP-fetches anything at all. Our
#     DHCP server offers option 66 (TFTP server = 192.168.50.2) and
#     option 67 (bootfile = wms/bluebird.cfg) to WMS-detected clients — this
#     file exists so that fetch, if it ever happens, is served and LOGGED.
#     (The IGT AVP never TFTP'd once across all 2026-06 bring-up captures.)
#   - If a BB2E fetches this and then misbehaves, suspect these comment
#     lines first — comment syntax tolerance is also unverified.
#   - Watch: journalctl -u casinonet-tftp + tcpdump udp port 69 (see
#     G2S/BENCH_BRINGUP_WMS.md, Phase 2).
# ============================================================================
#
# VALUES are the current proven stack (2026-07-01): G2S host
# http://192.168.50.2:8081/G2S on slot net 192.168.50.0/24, cert-less,
# HTTP only. Keep every URL/subnet here in lockstep with that.

[System]
MachineType=BB2E
Manufacturer=WMS
Model=BlueBird2e
SerialNumber=AUTO
AssetNumber=AUTO

[G2S]
# Primary and secondary both point at the one CasinoNet host (single-host
# topology). No HTTPS, no 8443 — cert-less HTTP on 8081 is the permanent path.
Host.Primary.URL=http://192.168.50.2:8081/G2S
Host.Primary.Protocol=G2S_v1.0.3
Host.Primary.Transport=HTTP
Host.Primary.Encoding=UTF-8

Host.Secondary.URL=http://192.168.50.2:8081/G2S
Host.Secondary.Protocol=G2S_v1.0.3
Host.Secondary.Transport=HTTP

# Discovery Settings
Discovery.Method=DHCP_DNS
Discovery.DNS.Names=g2s.local,g2shost.local,casinonet.local
Discovery.DHCP.UseOption43=true
Discovery.AutoRegister=true

# Communication Settings
Comm.Heartbeat.Enabled=true
Comm.Heartbeat.Interval=60
Comm.Timeout=30
Comm.RetryCount=3
Comm.RetryDelay=5000
Comm.BufferSize=65536

# Event Reporting
Events.Enabled=true
Events.BufferSize=1000
Events.SendImmediate=G2S_GPE,G2S_GAE
Events.BatchInterval=60

[AFT]
# Automated Funds Transfer
Enabled=true
TransferIn.Enabled=true
TransferOut.Enabled=true
Bonus.Enabled=true
Debit.Enabled=true
InHouse.Enabled=true

# Limits (millicents-vs-cents units unverified — TODO(bench))
MaxTransferIn=100000
MaxTransferOut=100000
MinTransfer=100

# Security
RequirePIN=false
RequirePlayerCard=false

[WAT]
# Wagering Account Transfers
Enabled=true
RequirePlayerCard=true
SessionTimeout=3600
AllowAnonymous=false

[Network]
# DHCP Settings
DHCP.Enabled=true
DHCP.SendHostname=true
DHCP.Hostname=WMS-BB2-{MAC}
# TODO(bench): the vendor class a real BB2E sends in option 60 is UNKNOWN.
# Our DHCP server matches any of: WMS-Gaming / WMS-BB2 / WMS-BlueBird
# (plus MAC-prefix and hostname fallbacks). Capture the real opt60 string
# on bench day and align both sides.
DHCP.VendorClass=WMS-BB2
DHCP.RequestOptions=1,3,6,15,42,43,60,66,67,119,150

# DNS Settings
DNS.UseDHCP=true
DNS.SearchDomains=casinonet.local,g2s.local,local

# NTP Settings (CasinoNet NTP answers on 192.168.50.2:123, stratum 1)
NTP.UseDHCP=true
NTP.SyncInterval=3600

[Security]
# Cert-less is the PERMANENT CasinoNet path — no certificates, no SCEP,
# no HTTPS. (SCEP/self-signed knobs that used to live here were cert-era
# leftovers and were removed 2026-07-01.)
Cert.Required=false

[Logging]
Level=INFO
MaxFileSize=10485760
MaxFiles=5
LogPath=/var/log/wms
LogG2S=true
LogNetwork=true
LogAFT=true

[Updates]
# Software/asset auto-update stays OFF. (Former UpdateServer/AssetServer
# URLs were removed 2026-07-01 — those endpoints do not exist on the
# CasinoNet host; g2s_host.py serves only /G2S, /api/status, /api/command.)
AutoUpdate=false

[Meters]
SendInterval=300
SendOnChange=true
CriticalMeters=CI,CO,GW,JP

[Handpay]
Enabled=true
LocalHandpay=true
RemoteHandpay=true
MinAmount=120000

[Display]
ShowAFTAmount=true
ShowBonusInfo=true
ShowPlayerInfo=true
MessageTimeout=10
