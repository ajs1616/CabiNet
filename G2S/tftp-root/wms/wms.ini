; WMS BB2E minimal G2S bootstrap - CasinoNet
; TODO(bench): file format + key names UNVERIFIED (design fiction, no WMS
; source); unknown whether a BB2E ever TFTP-fetches this. Served so any
; fetch gets logged (journalctl -u casinonet-tftp). If a machine fetches
; this and chokes, strip these ';' comment lines first - comment-syntax
; tolerance is itself unverified. See G2S/BENCH_BRINGUP_WMS.md.
; Values = proven stack 2026-07-01: http://192.168.50.2:8081/G2S, cert-less.
[Host]
Primary=http://192.168.50.2:8081/G2S
Secondary=http://192.168.50.2:8081/G2S
[Protocol]
Version=G2S_v1.0.3
Transport=HTTP
[AFT]
Enabled=1
[WAT]
Enabled=1
[Network]
UseDHCP=1
; TODO(bench): real BB2E opt60 vendor-class string unknown - capture it.
VendorClass=WMS-BB2
